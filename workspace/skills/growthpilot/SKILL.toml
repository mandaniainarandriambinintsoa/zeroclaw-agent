[skill]
name = "growthpilot"
description = "Scrape websites and generate social media posts via GrowthPilot API"
version = "0.2.0"
author = "Manda"
tags = ["marketing", "social-media", "content"]

[[tools]]
name = "gp_scrape"
description = "Scrape a website URL — POST https://growthpilot-nine.vercel.app/api/scrape with {url}"
kind = "http"
command = "POST https://growthpilot-nine.vercel.app/api/scrape"

[[tools]]
name = "gp_generate"
description = "Generate a social media post — POST https://growthpilot-nine.vercel.app/api/generate with {projectId, platform, scrapedData, tone, language}"
kind = "http"
command = "POST https://growthpilot-nine.vercel.app/api/generate"
